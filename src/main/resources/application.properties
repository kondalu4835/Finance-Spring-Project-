# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── H2 Database (file-based persistence, zero installation needed) ────────────
spring.datasource.url=jdbc:h2:file:./financedb;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (access at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=finance_super_secret_key_minimum_256_bits_long_change_in_production_12345
app.jwt.expiration-ms=28800000

# ── Swagger / OpenAPI ─────────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.finance=INFO
logging.level.org.springframework.security=WARN
